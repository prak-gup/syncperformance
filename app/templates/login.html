{% extends 'base.html' %}
{% block content %}
<h2>Login (Role simulation)</h2>
<form method="post">
  <label>Select user:</label>
  <select name="user_id" required>
    {% for u in users %}
      <option value="{{ u.id }}">{{ u.name }} ({{ u.role }})</option>
    {% endfor %}
  </select>
  <button type="submit">Login</button>
</form>
{% endblock %}
